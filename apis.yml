aid: microsoft-dynamics-365-sales
name: Microsoft Dynamics 365 Sales
description: >-
  Microsoft Dynamics 365 Sales is Microsoft's enterprise CRM application for
  managing leads, opportunities, accounts, contacts, sales pipelines, forecasts,
  and customer relationships, built on the Microsoft Dataverse platform and
  integrated with Microsoft 365, Teams, Copilot, and Power Platform. Developers
  programmatically interact with Dynamics 365 Sales data through the Dataverse
  Web API, an OData v4.0 RESTful interface that exposes every table, action,
  and function in a Sales environment. The Dataverse Web API uses OAuth 2.0
  (Microsoft Entra ID) Bearer token authentication and is reached at a
  per-environment endpoint such as https://{org}.api.crm.dynamics.com/api/data/v9.2/.
type: Index
