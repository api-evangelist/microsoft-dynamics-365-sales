apis:
  - aid: microsoft-dynamics-365-sales:dataverse-web-api
    name: Microsoft Dataverse Web API (Dynamics 365 Sales)
    description: >-
      OData v4.0 RESTful Web API for Microsoft Dataverse used to create, read,
      update, and delete Dynamics 365 Sales records (leads, opportunities,
      accounts, contacts, quotes, orders, invoices, products) and to invoke
      bound and unbound actions and functions. Authentication uses OAuth 2.0
      Bearer tokens issued by Microsoft Entra ID; the endpoint is
      per-environment, e.g. https://{org}.api.crm.dynamics.com/api/data/v9.2/.
    humanURL: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/webapi/overview
    baseURL: https://{org}.api.crm.dynamics.com/api/data/v9.2
